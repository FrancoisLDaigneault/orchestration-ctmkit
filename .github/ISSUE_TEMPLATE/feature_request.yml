name: Feature request
description: Suggest a capability for ctmkit
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that ctmkit can't do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Which surface/verb or module would this live in?
    validations:
      required: false
